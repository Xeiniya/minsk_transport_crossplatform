name: minsk_transport_crossplatform
description: Minsk Transport Navigation App
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # UI & Core
  intl: ^0.20.0
  flutter_riverpod: ^2.5.0
  go_router: ^14.0.0
  
  # Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Utilities
  equatable: ^2.0.5
  url_launcher: ^6.2.5
  
  # Animation & UI Effects
  animate_do: ^3.3.4
  shimmer: ^3.0.0
  
  # Connectivity
  connectivity_plus: ^6.0.0
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  firebase_messaging: ^16.2.1
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/translations/