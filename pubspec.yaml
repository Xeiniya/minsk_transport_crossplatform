name: minsk_transport_crossplatform
description: Cross-platform transport navigation app for Minsk
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.18.0
  
  flutter_riverpod: ^2.4.0
  go_router: ^13.0.0
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  path_provider: ^2.1.0
  shared_preferences: ^2.2.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  connectivity_plus: ^5.0.0
  url_launcher: ^6.2.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  
  assets:
    - assets/translations/
