name: CI/CD - Build and Test All Platforms

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.16.0'

jobs:
  # ==================== ТЕСТИРОВАНИЕ ====================
  
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Run Unit Tests
        run: flutter test test/unit/ --reporter expanded
      
      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: test/unit/

  widget-tests:
    name: Widget Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Run Widget Tests
        run: flutter test test/widget/ --reporter expanded
      
      - name: Upload widget test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: widget-test-results
          path: test/widget/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Run Integration Tests
        run: flutter test integration_test/ --reporter expanded || echo "No integration tests found"
      
      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: integration_test/

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: [unit-tests, widget-tests]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Generate Coverage
        run: flutter test --coverage
      
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  # ==================== СБОРКА ДЛЯ ВСЕХ ПЛАТФОРМ ====================

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: [unit-tests, widget-tests]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build for Web
        run: flutter build web --release --web-renderer canvaskit
      
      - name: Upload Web Build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          destination_dir: web

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: [unit-tests, widget-tests]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build Android APK
        run: flutter build apk --release
      
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
      
      - name: Build Android App Bundle
        run: flutter build appbundle --release
      
      - name: Upload Android AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/app-release.aab

  build-linux:
    name: Build Linux Desktop
    runs-on: ubuntu-latest
    needs: [unit-tests, widget-tests]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      
      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build for Linux
        run: flutter build linux --release
      
      - name: Upload Linux Build
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/linux/x64/release/bundle/

  build-windows:
    name: Build Windows Desktop
    runs-on: windows-latest
    needs: [unit-tests, widget-tests]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build for Windows
        run: flutter build windows --release
      
      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows/x64/runner/Release/

  build-macos:
    name: Build macOS (Intel)
    runs-on: macos-latest
    needs: [unit-tests, widget-tests]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build for macOS
        run: flutter build macos --release
      
      - name: Upload macOS Build
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: build/macos/Build/Products/Release/

  build-ios:
    name: Build iOS (Simulator)
    runs-on: macos-latest
    needs: [unit-tests, widget-tests]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build for iOS
        run: flutter build ios --release --no-codesign
      
      - name: Upload iOS Build
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/iphoneos/

  # ==================== РЕЛИЗ ====================

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-web, build-android, build-linux, build-windows, build-macos, build-ios]
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/web-build/**
            artifacts/android-apk/**
            artifacts/android-aab/**
            artifacts/linux-build/**
            artifacts/windows-build/**
            artifacts/macos-build/**
            artifacts/ios-build/**
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
